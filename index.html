<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Motivational Quote Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🚀 Motivation Generator</h1>

<div class="quote-box">

</div>

</div>

<script src="script.js"></script>

</body>
